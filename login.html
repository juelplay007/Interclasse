<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BORA JOGAR • LOGIN</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }

    body{
      background:#050505;
      overflow-x:hidden;
      color:white;
    }

    .left-side{
      background:
      linear-gradient(
        180deg,
        rgba(0,0,0,.55),
        rgba(0,0,0,.88)
      ),
      url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=1600');
      background-size:cover;
      background-position:center;
    }

    .glass{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
    }

    .input-style{
      background:#0f0f0f;
      border:1px solid rgba(255,255,255,.05);
      transition:.3s;
      color:white;
    }

    .input-style:focus{
      outline:none;
      border-color:#22c55e;
      box-shadow:0 0 0 4px rgba(34,197,94,.08);
    }

    .green-button{
      background:#22c55e;
      transition:.3s;
    }

    .green-button:hover{
      transform:translateY(-2px);
      box-shadow: 0 10px 30px rgba(34,197,94,.2);
    }

    .title-gradient{
      background:linear-gradient(90deg, #ffffff, #22c55e);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .secondary-button{
      border:1px solid rgba(255,255,255,.08);
      transition:.3s;
    }

    .secondary-button:hover{
      border-color:#22c55e;
      color:#22c55e;
    }
  </style>
</head>

<body>

  <main class="w-full min-h-screen grid lg:grid-cols-2">

    <section class="left-side relative hidden lg:flex items-center px-20">
      <div class="absolute inset-0 bg-gradient-to-r from-black/10 to-black"></div>
      
      <div class="relative z-10 max-w-xl">
        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full glass mb-8">
          <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
          <span class="text-sm text-green-300 font-medium">
            TEMPORADA INTERCLASSE 2026
          </span>
        </div>

        <h1 class="text-7xl font-black leading-[82px] text-white">
          O ESPORTE<br>ESCOLAR<br>EM UM<br>NOVO NÍVEL.
        </h1>
      </div>
    </section>

    <section class="bg-[#050505] flex items-center justify-center px-6 py-10">
      <div class="w-full max-w-[460px]">

        <div class="mb-12">
          <h1 class="text-5xl font-black italic title-gradient">
            BORA JOGAR
          </h1>
          <p class="text-zinc-500 mt-3">
            Faça login para acessar o sistema
          </p>
        </div>

        <div class="glass rounded-[34px] p-8">

          <form id="loginForm" class="space-y-6">

            <div>
              <label for="email" class="text-sm text-zinc-400 font-medium block mb-3">
                E-mail
              </label>
              <input
                type="email"
                id="email"
                placeholder="Digite seu e-mail"
                class="input-style w-full rounded-2xl px-5 py-4"
                required
              >
            </div>

            <div>
              <div class="flex items-center justify-between mb-3">
                <label for="password" class="text-sm text-zinc-400 font-medium">
                  Senha
                </label>

                <button
                  type="button"
                  id="alunoBtn"
                  class="text-sm text-green-400 hover:text-green-300 transition-all font-medium"
                >
                  Login como aluno
                </button>
              </div>

              <div class="relative">
                <input
                  type="password"
                  id="password"
                  placeholder="Digite sua senha"
                  class="input-style w-full rounded-2xl px-5 py-4 pr-14"
                  required
                >

                <button
                  type="button"
                  id="togglePassword"
                  class="absolute right-5 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-white transition-all text-sm font-medium"
                >
                  Ocultar
                </button>
              </div>
            </div>

            <div class="space-y-4 pt-2">
              <button
                type="submit"
                class="green-button w-full py-4 rounded-2xl text-black font-bold text-lg"
              >
                Entrar
              </button>
            </div>

          </form>
        </div>

      </div>
    </section>

  </main>

  <script>
    /*
    =====================================
    PASSWORD TOGGLE
    =====================================
    */
    const passwordInput = document.getElementById("password");
    const togglePassword = document.getElementById("togglePassword");

    togglePassword.addEventListener("click", () => {
      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        togglePassword.textContent = "Mostrar";
      } else {
        passwordInput.type = "password";
        togglePassword.textContent = "Ocultar";
      }
    });

    /*
    =====================================
    LOGIN NORMAL
    =====================================
    */
    const loginForm = document.getElementById("loginForm");

    loginForm.addEventListener("submit", (e) => {
      e.preventDefault();
      window.location.href = "admin.html";
    });

    /*
    =====================================
    LOGIN COMO ALUNO
    =====================================
    */
    document.getElementById('alunoBtn').addEventListener('click', () => {
      window.location.href = "index.html";
    });
  </script>

</body>
</html>
